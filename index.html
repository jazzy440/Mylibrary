<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f0f17">
  <meta name="description" content="La tua libreria personale di libri">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyLibrary">

  <title>My Library</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">

  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/animations.css">

  <!-- Chart.js + ZXing barcode scanner (cached by SW after first load) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
</head>
<body>

  <div id="app">
    <main id="view-container" class="view"></main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-view="library">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <span>Libreria</span>
      </button>

      <button class="nav-item" data-view="add">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <span>Aggiungi</span>
      </button>

      <button class="nav-item" data-view="stats">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
          </svg>
        </div>
        <span>Statistiche</span>
      </button>
    </nav>
  </div>

  <!-- Install banner -->
  <div id="install-banner" class="install-banner">
    <div class="install-icon">📚</div>
    <div class="install-text">
      <strong>Installa My Library</strong>
      <span>Accesso rapido dalla home, anche offline</span>
    </div>
    <button id="install-btn" class="btn btn-primary install-cta">Installa</button>
    <button id="install-dismiss" class="icon-btn" aria-label="Chiudi">✕</button>
  </div>

  <!-- iOS install instructions -->
  <div id="ios-install-hint" class="ios-hint">
    <div class="ios-hint-card">
      <h3>Installa su iPhone</h3>
      <ol>
        <li>Tocca il pulsante <strong>Condividi</strong> <span class="ios-share">⬆</span> nella barra di Safari</li>
        <li>Scorri e tocca <strong>«Aggiungi a Home»</strong></li>
        <li>Conferma con <strong>Aggiungi</strong></li>
      </ol>
      <button class="btn btn-primary btn-full" onclick="document.getElementById('ios-install-hint').classList.remove('show')">Ho capito</button>
    </div>
  </div>

  <!-- Bottom sheet -->
  <div id="sheet-backdrop" class="sheet-backdrop"></div>
  <div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheet-title" class="sheet-title"></h2>
      <button id="sheet-close-btn" class="icon-btn" aria-label="Chiudi">✕</button>
    </div>
    <div id="sheet-content" class="sheet-content"></div>
    <div id="sheet-actions" class="sheet-actions"></div>
  </div>

  <!-- Barcode scanner -->
  <div id="scanner-overlay" class="scanner-overlay">
    <div class="scanner-header">
      <span class="scanner-title">Scansiona ISBN</span>
      <button id="scanner-close" class="icon-btn scanner-close" aria-label="Chiudi">✕</button>
    </div>
    <div class="scanner-video-wrap">
      <video id="scanner-video" playsinline muted></video>
      <div class="scanner-frame"></div>
      <div class="scanner-laser"></div>
    </div>
    <div id="scanner-status" class="scanner-status">Inquadra il codice a barre…</div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
