<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c6af0">
  <meta name="description" content="La tua libreria personale">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyLibrary">

  <title>My Library</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">

  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">

  <!-- Chart.js via CDN (cached by service worker after first load) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

  <div id="app">
    <!-- Active view is injected here -->
    <main id="view-container" class="view"></main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="library">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <span>Libreria</span>
      </button>

      <button class="nav-item" data-view="add">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <span>Aggiungi</span>
      </button>

      <button class="nav-item" data-view="stats">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
          </svg>
        </div>
        <span>Statistiche</span>
      </button>
    </nav>
  </div>

  <!-- Bottom sheet overlay (always in DOM) -->
  <div id="sheet-backdrop" class="sheet-backdrop"></div>
  <div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheet-title" class="sheet-title"></h2>
      <button id="sheet-close-btn" class="icon-btn" aria-label="Chiudi">✕</button>
    </div>
    <div id="sheet-content" class="sheet-content"></div>
    <div id="sheet-actions" class="sheet-actions"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
